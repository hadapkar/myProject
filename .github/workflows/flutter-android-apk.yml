name: Flutter Android APK

on:
  push:
    branches: [main]
    paths:
      - "project/game-desktop/**"
      - ".github/workflows/flutter-android-apk.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/game-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android platform files exist
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Set Android package name (com.kingmaker.admin)
        shell: bash
        run: |
          APP_ID="com.kingmaker.admin"
          OLD_ID="com.example.kingmaker"
          # Update build files / manifests
          for f in android/app/build.gradle android/app/build.gradle.kts android/app/src/main/AndroidManifest.xml; do
            if [ -f "$f" ]; then
              sed -i "s/${OLD_ID//./\\.}/${APP_ID//./\\.}/g" "$f" || true
            fi
          done
          # Update MainActivity package + path (Kotlin)
          OLD_PATH="android/app/src/main/kotlin/com/example/kingmaker/MainActivity.kt"
          if [ -f "$OLD_PATH" ]; then
            NEW_DIR="android/app/src/main/kotlin/com/kingmaker/admin"
            mkdir -p "$NEW_DIR"
            sed -i "s/^package .*/package $APP_ID/" "$OLD_PATH" || true
            mv "$OLD_PATH" "$NEW_DIR/MainActivity.kt"
          fi
          # Replace any remaining occurrences in android folder
          if command -v grep >/dev/null 2>&1; then
            grep -RIl "$OLD_ID" android | while read -r file; do
              sed -i "s/${OLD_ID//./\\.}/${APP_ID//./\\.}/g" "$file" || true
            done
          fi

      - name: Write google-services.json (optional)
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p android/app
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written"
          else
            echo "GOOGLE_SERVICES_JSON secret not set (ok unless you use Firebase SDK in-app)."
          fi

      - name: Set Android app name (King Maker)
        shell: bash
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$STRINGS" ]; then
            sed -i 's#<string name="app_name">[^<]*</string>#<string name="app_name">King Maker</string>#' "$STRINGS" || true
          fi
          if [ -f "$MANIFEST" ]; then
            # Prefer using @string/app_name in the manifest.
            sed -i 's/android:label="[^"]*"/android:label="@string\\/app_name"/' "$MANIFEST" || true
          fi

      - name: Build APK (release)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$API_BASE_URL" ]; then
            echo "Missing required secrets SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL" >&2
            exit 1
          fi
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="0.0.0-android+${GITHUB_SHA:0:7}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kingmaker-android-apk
          path: project/game-desktop/build/app/outputs/flutter-apk/app-release.apk
