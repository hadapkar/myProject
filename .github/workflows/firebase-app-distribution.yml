name: Firebase App Distribution (Android)

on:
  workflow_dispatch: {}

jobs:
  distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/game-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android platform files exist
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Set Android package name (com.kingmaker.admin)
        shell: bash
        run: |
          APP_ID="com.kingmaker.admin"
          OLD_ID="com.example.kingmaker"
          for f in android/app/build.gradle android/app/build.gradle.kts android/app/src/main/AndroidManifest.xml; do
            if [ -f "$f" ]; then
              sed -i "s/${OLD_ID//./\\.}/${APP_ID//./\\.}/g" "$f" || true
            fi
          done
          OLD_PATH="android/app/src/main/kotlin/com/example/kingmaker/MainActivity.kt"
          if [ -f "$OLD_PATH" ]; then
            NEW_DIR="android/app/src/main/kotlin/com/kingmaker/admin"
            mkdir -p "$NEW_DIR"
            sed -i "s/^package .*/package $APP_ID/" "$OLD_PATH" || true
            mv "$OLD_PATH" "$NEW_DIR/MainActivity.kt"
          fi
          if command -v grep >/dev/null 2>&1; then
            grep -RIl "$OLD_ID" android | while read -r file; do
              sed -i "s/${OLD_ID//./\\.}/${APP_ID//./\\.}/g" "$file" || true
            done
          fi

      - name: Set Android app name (King Maker)
        shell: bash
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$STRINGS" ]; then
            sed -i 's#<string name="app_name">[^<]*</string>#<string name="app_name">King Maker</string>#' "$STRINGS" || true
          fi
          if [ -f "$MANIFEST" ]; then
            sed -i 's/android:label="[^"]*"/android:label="@string\\/app_name"/' "$MANIFEST" || true
          fi

      - name: Build APK (release)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$API_BASE_URL" ]; then
            echo "Missing required secrets SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL" >&2
            exit 1
          fi
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="0.0.0-android+${GITHUB_SHA:0:7}"

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Write service account key
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret" >&2
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json

      - name: Distribute to Firebase App Distribution
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
        run: |
          if [ -z "$FIREBASE_APP_ID" ]; then
            echo "Missing FIREBASE_APP_ID secret" >&2
            exit 1
          fi
          if [ -z "$FIREBASE_GROUPS" ]; then
            echo "Missing FIREBASE_GROUPS secret (example: testers)" >&2
            exit 1
          fi
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "$FIREBASE_GROUPS" \
            --release-notes "Commit ${GITHUB_SHA}"
