name: Manual Release - Windows Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: project/game-desktop
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION (expected vMAJOR.MINOR.PATCH)" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Ensure Windows runner exists
        run: |
          if [ ! -d "windows" ]; then
            flutter create . --platforms=windows
          fi

      - name: Patch Windows runner defaults
        shell: pwsh
        run: |
          ./tools/patch_windows_runner.ps1 -ProjectDir "${{ github.workspace }}\\project\\game-desktop"

      - name: Build Windows (release)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$API_BASE_URL" ]; then
            echo "Missing required secrets SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL" >&2
            exit 1
          fi
          flutter build windows --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="$VERSION"

      - name: Verify release output contains exe + assets
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          test -f "$OUT_DIR/KingMaker.exe"
          test -d "$OUT_DIR/data/flutter_assets"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Bg.jpg"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Wheel5.png"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/Sounds/clock_ticking.wav"

      - name: Package zip
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          cd "$OUT_DIR"
          7z a -tzip "../../../../King Maker.zip" ./*

      - name: Create/Update GitHub Release and upload asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ inputs.version }}"
          $assetNew = "${{ github.workspace }}\\project\\game-desktop\\build\\King Maker.zip"
          if (!(Test-Path $assetNew)) { throw "Asset not found: $assetNew" }

          gh release view $version --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $version $assetNew --title $version --notes "See CHANGELOG.md" --repo "${{ github.repository }}"
          } else {
            gh release upload $version $assetNew --clobber --repo "${{ github.repository }}"
          }
