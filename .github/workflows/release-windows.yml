name: Release - Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: project/game-desktop
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Ensure Windows runner exists
        run: |
          if [ ! -d "windows" ]; then
            flutter create . --platforms=windows
          fi

      - name: Patch Windows runner defaults
        shell: pwsh
        run: |
          ./tools/patch_windows_runner.ps1 -ProjectDir "${{ github.workspace }}\\project\\game-desktop"

      - name: Build Windows (release)
        run: |
          flutter build windows --release

      - name: Copy runtime config templates into release folder
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          cp -f dist/config.json.example "$OUT_DIR/config.json.example"
          cp -f dist/RUN_ME_FIRST.txt "$OUT_DIR/RUN_ME_FIRST.txt"

      - name: Package zip
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          cd "$OUT_DIR"
          7z a -tzip "../../../../funtarget-windows.zip" ./*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: project/game-desktop/build/funtarget-windows.zip
