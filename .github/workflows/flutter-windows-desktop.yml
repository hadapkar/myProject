name: Flutter Windows Desktop (Artifact)

on:
  push:
    branches: [main]
    paths:
      - "project/game-desktop/**"
      - ".github/workflows/flutter-windows-desktop.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: project/game-desktop
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Ensure Windows runner exists
        run: |
          if [ ! -d "windows" ]; then
            flutter create . --platforms=windows
          fi

      - name: Patch Windows runner defaults
        shell: pwsh
        run: |
          ./tools/patch_windows_runner.ps1 -ProjectDir "${{ github.workspace }}\\project\\game-desktop"

      - name: Verify Windows runner patch applied
        run: |
          grep -R "FUNTARGET_WINDOW_DEFAULTS" -n windows/runner/main.cpp || {
            echo "WARN: patch marker not found (template may have changed). Continuing build."
            exit 0
          }

      - name: Build Windows (release)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$API_BASE_URL" ]; then
            echo "Missing required secrets SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL" >&2
            exit 1
          fi
          flutter build windows --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="0.0.0+${GITHUB_SHA:0:7}"

      - name: Ensure exe is named KingMaker.exe
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          if [ -f "$OUT_DIR/funtarget_game.exe" ] && [ ! -f "$OUT_DIR/KingMaker.exe" ]; then
            mv "$OUT_DIR/funtarget_game.exe" "$OUT_DIR/KingMaker.exe"
          fi

      - name: Verify release output contains assets
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          if [ ! -f "$OUT_DIR/KingMaker.exe" ]; then
            echo "KingMaker.exe not found. Contents of $OUT_DIR:" >&2
            ls -la "$OUT_DIR" || true
            echo "Exe candidates:" >&2
            ls -la "$OUT_DIR"/*.exe 2>/dev/null || true
            exit 1
          fi
          test -d "$OUT_DIR/data/flutter_assets"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Bg.jpg"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Wheel5.png"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/Sounds/clock_ticking.wav"

      - name: Copy optional config templates into release folder
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          cp -f dist/config.json.example "$OUT_DIR/config.json.example"
          cp -f dist/RUN_ME_FIRST.txt "$OUT_DIR/RUN_ME_FIRST.txt"

      - name: Package artifact (zip)
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          if [ ! -d "$OUT_DIR" ]; then
            echo "Expected output dir not found: $OUT_DIR" >&2
            ls -la build/windows || true
            exit 1
          fi
          cd "$OUT_DIR"
          7z a -tzip "../../../../King Maker.zip" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-maker-windows
          path: project/game-desktop/build/King Maker.zip
