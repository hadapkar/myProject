name: Flutter Windows Desktop (Artifact)

on:
  push:
    branches: [main]
    paths:
      - "project/game-desktop/**"
      - ".github/workflows/flutter-windows-desktop.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: project/game-desktop
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Ensure Windows runner exists
        run: |
          if [ ! -d "windows" ]; then
            flutter create . --platforms=windows
          fi

      - name: Patch Windows runner defaults
        shell: pwsh
        run: |
          ./tools/patch_windows_runner.ps1 -ProjectDir "${{ github.workspace }}\\project\\game-desktop"

      - name: Verify Windows runner patch applied
        run: |
          grep -R "FUNTARGET_WINDOW_DEFAULTS" -n windows/runner/main.cpp

      - name: Build Windows (release)
        run: |
          # Desktop builds can be configured at runtime via `config.json` next to the exe,
          # so CI does not need to bake secrets into the binary.
          flutter build windows --release

      - name: Verify release output contains assets
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          test -d "$OUT_DIR"
          EXE_COUNT=$(ls -1 "$OUT_DIR"/*.exe 2>/dev/null | wc -l | tr -d ' ')
          if [ "$EXE_COUNT" -lt 1 ]; then
            echo "No .exe found in $OUT_DIR" >&2
            ls -la "$OUT_DIR" || true
            exit 1
          fi
          test -d "$OUT_DIR/data/flutter_assets"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Bg.jpg"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/media/FunTargetImages/Wheel5.png"
          test -f "$OUT_DIR/data/flutter_assets/assets/funTargrtAsset/Sounds/clock_ticking.wav"

      - name: Package artifact (zip)
        run: |
          set -euo pipefail
          OUT_DIR="build/windows/x64/runner/Release"
          if [ ! -d "$OUT_DIR" ]; then
            echo "Expected output dir not found: $OUT_DIR" >&2
            ls -la build/windows || true
            exit 1
          fi
          cd "$OUT_DIR"
          7z a -tzip "../../../../funtarget-windows.zip" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: funtarget-windows
          path: project/game-desktop/build/funtarget-windows.zip
