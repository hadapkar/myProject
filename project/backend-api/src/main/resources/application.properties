spring.application.name=backend-api

# Render sets PORT for web services
server.port=${PORT:8080}

# Disable default generated user/password (we use Supabase bearer tokens only)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Supabase project settings (safe to use anon key here; never use service_role on the client)
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# Server hardening / proxy awareness (Render sits behind a proxy)
server.forward-headers-strategy=framework

# Request limits (keep small; game payloads are tiny JSON)
server.max-http-request-header-size=16KB
server.tomcat.max-http-form-post-size=32KB
server.tomcat.max-swallow-size=2MB
server.tomcat.connection-timeout=10s

# Comma-separated list of allowed origins for browser clients (Vercel, localhost, etc.)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Basic API rate limit (per user/IP per minute). Tune based on Render plan.
app.ratelimit.per-minute=${RATE_LIMIT_PER_MINUTE:120}

# Never show the default "whitelabel" HTML page.
server.error.whitelabel.enabled=false

# API request body cap (bytes) for /api/* endpoints.
app.request.max-bytes=${REQUEST_MAX_BYTES:32768}
