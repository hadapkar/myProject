spring.application.name=backend-api

# Render sets PORT for web services
server.port=${PORT:8080}

# Supabase project settings (safe to use anon key here; never use service_role on the client)
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}

# Comma-separated list of allowed origins for browser clients (Vercel, localhost, etc.)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
