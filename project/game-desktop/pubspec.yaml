name: kingmaker
description: FunTarget game client (Flutter web + desktop).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  http: ^1.2.2
  supabase_flutter: ^2.8.0
  just_audio: ^0.9.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app/
    # Flutter does not include subdirectories automatically; list the leaf folders.
    - assets/funTargrtAsset/Sounds/
    - assets/funTargrtAsset/media/FunTargetImages/
    - assets/funTargrtAsset/media/BAD/
    - assets/funTargrtAsset/media/BAD/golo/
