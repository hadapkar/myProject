services:
  - type: web
    name: backend-api
    env: java
    rootDir: project/backend-api
    buildCommand: ./gradlew build
    startCommand: java -jar build/libs/backend-api-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

